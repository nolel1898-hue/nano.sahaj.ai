<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- ========================================== -->
    <!-- السيو الأساسي (تلقائي من السكربت) -->
    <!-- ========================================== -->
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="keywords" content="{{KEYWORDS}}">
    <link rel="canonical" href="/"> <!-- يمكن تعديل هذا برمجياً إذا لزم الأمر -->

    <!-- ========================================== -->
    <!-- Open Graph (فيسبوك، لينكدإن، واتساب) -->
    <!-- ========================================== -->
    <meta property="og:type" content="video.other">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="https://imges007.s3.amazonaws.com/assets/img/viralimg/d128faba91f40c35883d0e795867fa819385.jpg">
    
    <!-- ========================================== -->
    <!-- Twitter Cards (تويتر / X) -->
    <!-- ========================================== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    <meta name="twitter:image" content="https://imges007.s3.amazonaws.com/assets/img/viralimg/d128faba91f40c35883d0e795867fa819385.jpg">

    <!-- ========================================== -->
    <!-- التصميم والخطوط (Tailwind CSS & Google Fonts) -->
    <!-- ========================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], },
                    colors: { brand: { light: '#f0f9ff', DEFAULT: '#0284c7', dark: '#0369a1', } }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* تنسيق الروابط الداخلية التي يولدها سكربت البايثون كـ ul/li */
        .generated-links ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.75rem; }
        .generated-links li { 
            background: #ffffff; 
            padding: 0.85rem 1rem; 
            border-radius: 0.5rem; 
            border: 1px solid #e2e8f0; 
            transition: all 0.3s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .generated-links li:hover { background: #f0f9ff; border-color: #bae6fd; transform: translateY(-2px); }
        .generated-links a { text-decoration: none; color: #334155; font-weight: 600; display: block; font-size: 0.9rem; line-height: 1.4; }
        .generated-links a:hover { color: #0284c7; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <!-- ========================================== -->
    <!-- الهيدر -->
    <!-- ========================================== -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-2xl font-bold text-brand">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-4v8H5V5h2v8l5-4 5 4V5h2v14h-2v-8l-5 4z"/></svg>
                <span>موقعي</span>
            </a>
            <nav class="hidden md:flex gap-6 font-semibold text-gray-600">
                <a href="#" class="hover:text-brand transition">الرئيسية</a>
                <a href="#" class="text-brand border-b-2 border-brand">المحتوى الرائج</a>
                <a href="#" class="hover:text-brand transition">الأقسام</a>
            </nav>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- المحتوى الرئيسي -->
    <!-- ========================================== -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8 w-full">
        
        <!-- القسم الأيمن (70%) -->
        <article class="w-full lg:w-2/3">
            
            <!-- مسار التنقل (Breadcrumbs) -->
            <nav class="flex text-sm text-gray-500 mb-4" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 space-x-reverse md:space-x-2">
                    <li class="inline-flex items-center"><a href="/" class="hover:text-brand transition">الرئيسية</a></li>
                    <li><span class="mx-2 text-gray-400">/</span></li>
                    <li><span class="text-gray-800 font-semibold truncate max-w-[200px]" aria-current="page">{{TITLE}}</span></li>
                </ol>
            </nav>

            <!-- مشغل الفيديو -->
            <div class="video-container relative w-full pt-[56.25%] bg-black rounded-xl overflow-hidden shadow-lg mb-6">
                <!-- استبدل رابط اليوتيوب بما يناسب موقعك أو استخدم صورة بديلة في حال كان نصياً فقط -->
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="فيديو العرض" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>
            </div>

            <!-- تفاصيل المحتوى -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100">
                <h1 id="video-title" class="text-2xl md:text-3xl font-bold text-gray-900 mb-3 leading-tight">
                    {{TITLE}}
                </h1>
                
                <div class="flex flex-wrap items-center justify-between text-sm text-gray-500 mb-6 border-b border-gray-100 pb-4">
                    <div class="flex items-center gap-4">
                        <!-- التوقيت الذكي المرتبط بـ Date من السكربت -->
                        <span id="dynamic-time" class="flex items-center gap-1 font-semibold text-brand" data-publish-date="{{DATE}}">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            جاري الحساب...
                        </span>
                        <span class="flex items-center gap-1 hidden sm:flex">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            عالي المشاهدة
                        </span>
                    </div>
                    
                    <!-- أزرار المشاركة -->
                    <div class="flex items-center gap-2 mt-4 sm:mt-0">
                        <!-- فيسبوك -->
                        <button onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(location.href))" class="bg-blue-600 text-white p-2 rounded-full hover:bg-blue-700 transition" aria-label="شارك على فيسبوك">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
                        </button>
                        <!-- تويتر/X -->
                        <button onclick="window.open('https://twitter.com/intent/tweet?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(document.title))" class="bg-black text-white p-2 rounded-full hover:bg-gray-800 transition" aria-label="شارك على X">
                           <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                        </button>
                        <!-- واتساب -->
                        <button onclick="window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(document.title + ' ' + location.href))" class="bg-green-500 text-white p-2 rounded-full hover:bg-green-600 transition" aria-label="شارك على واتساب">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- نص الوصف -->
                <div id="video-description" class="prose max-w-none text-gray-700 leading-relaxed text-lg">
                    <p>{{DESCRIPTION}}</p>
                </div>
            </div>
        </article>

        <!-- القسم الأيسر: الروابط الداخلية من السكربت (30%) -->
        <aside class="w-full lg:w-1/3">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 sticky top-20">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-gray-900 border-r-4 border-brand pr-2">محتوى ذو صلة</h2>
                </div>
                
                <!-- حاوية الروابط الداخلية الديناميكية -->
                <div class="generated-links">
                    {{INTERNAL_LINKS}}
                </div>
            </div>
        </aside>

    </main>

    <!-- ========================================== -->
    <!-- الفوتر -->
    <!-- ========================================== -->
    <footer class="bg-gray-900 text-gray-300 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-sm text-center text-gray-500">
            &copy; <span id="current-year"></span> جميع الحقوق محفوظة. 
            <span class="hidden sm:inline"> | يتم إنشاء المحتوى تلقائياً.</span>
        </div>
    </footer>

    <!-- ========================================== -->
    <!-- سكربتات (الوقت الذكي + Schema.org للسيو) -->
    <!-- ========================================== -->
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // التوقيت الذكي: يقرأ متغير {{DATE}} ويحسب الزمن المار
        function formatRelativeTime() {
            const timeElement = document.getElementById('dynamic-time');
            const publishDateStr = timeElement.getAttribute('data-publish-date'); 
            
            // في حال عدم عمل المتغير في الاختبار، يمنع الخطأ
            if (!publishDateStr || publishDateStr.includes('{{')) return; 

            const publishDate = new Date(publishDateStr);
            const now = new Date();
            const diffInSeconds = Math.floor((now - publishDate) / 1000);

            let displayText = '';
            if (diffInSeconds < 60) {
                displayText = 'نُشر الآن';
            } else if (diffInSeconds < 3600) {
                const minutes = Math.floor(diffInSeconds / 60);
                displayText = `نُشر منذ ${minutes} دقيقة`;
            } else if (diffInSeconds < 86400) {
                const hours = Math.floor(diffInSeconds / 3600);
                displayText = `نُشر منذ ${hours} ساعة`;
            } else if (diffInSeconds < 172800) {
                displayText = 'نُشر أمس';
            } else if (diffInSeconds < 2592000) {
                const days = Math.floor(diffInSeconds / 86400);
                displayText = `نُشر منذ ${days} أيام`;
            } else {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                displayText = `نُشر في ${publishDate.toLocaleDateString('ar-EG', options)}`;
            }

            timeElement.innerHTML = `
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                ${displayText}
            `;
        }
        formatRelativeTime();

        // التوليد التلقائي للـ Schema
        (function generateSchema() {
            try {
                // التأكد من عدم وجود بيانات خام غير مستبدلة (في حال الاختبار بدون السكربت)
                const rawTitle = "{{TITLE}}";
                const title = document.getElementById('video-title').innerText.trim();
                if(title === rawTitle) return;

                const description = document.getElementById('video-description').innerText.trim();
                const publishDate = document.getElementById('dynamic-time').getAttribute('data-publish-date');
                const thumbnailUrl = document.querySelector('meta[property="og:image"]').getAttribute('content');
                
                const schemaData = {
                    "@context": "https://schema.org",
                    "@type": "VideoObject",
                    "name": title,
                    "description": description,
                    "thumbnailUrl": thumbnailUrl,
                    "uploadDate": publishDate,
                    "contentUrl": window.location.href
                };

                const scriptEl = document.createElement('script');
                scriptEl.type = "application/ld+json";
                scriptEl.text = JSON.stringify(schemaData);
                document.head.appendChild(scriptEl);
            } catch (e) {
                console.error("Schema Gen Error:", e);
            }
        })();
    </script>
</body>
</html>
